<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RCCU · Isometric Corridor Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --panel: rgba(255, 255, 255, 0.96);
    --line: #d7dde3;
    --text: #17324a;
    --muted: #62758a;
    --accent: #1b74d1;
  }
  body {
    font-family: "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
    background: #ffffff;
  }
  canvas { width: 100%; height: 100%; display: block; }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 16px 28px;
    background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.72) 52%, rgba(255,255,255,0) 100%);
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  #header h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1.2px;
    color: var(--accent);
  }
  #header .subtitle {
    font-size: 12px;
    color: var(--muted);
  }

  #legend {
    position: fixed;
    top: 64px;
    right: 18px;
    z-index: 10;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 16px 36px rgba(117, 142, 169, 0.14);
    font-size: 11px;
    color: var(--text);
  }
  #legend div {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
  }
  .legend-sq {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid rgba(0, 0, 0, 0.05);
  }

  #controls {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10;
    padding: 14px 26px 18px;
    background: linear-gradient(0deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.74) 52%, rgba(255,255,255,0) 100%);
  }
  #timeline {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  #timeline button {
    background: #f4f8fb;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  #timeline button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  #slider {
    flex: 1;
    height: 4px;
    appearance: none;
    background: #dbe4ec;
    border-radius: 2px;
    outline: none;
  }
  #slider::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  #time-label {
    min-width: 180px;
    font-size: 13px;
    color: var(--muted);
  }
  #speed-label {
    font-size: 12px;
    color: var(--muted);
  }
  #speed-select {
    margin-left: 4px;
    padding: 4px 7px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
  }
  #stats {
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--muted);
  }
  #stats span {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #stats .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-size: 14px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div id="loading">Loading simulation data...</div>

<div id="header">
  <h1>RCCU</h1>
  <span class="subtitle">Bright isometric corridor emergence viewer</span>
</div>

<div id="legend">
  <div><span class="legend-sq" style="background:#64B5F6"></span>Water</div>
  <div><span class="legend-sq" style="background:#8CD67A"></span>Farmland</div>
  <div><span class="legend-sq" style="background:#388E3C"></span>Eco reserve</div>
  <div><span class="legend-sq" style="background:#FF7043"></span>Settlement</div>
  <div><span class="legend-sq" style="background:#E8E0DA"></span>Bare land</div>
</div>

<div id="canvas-container">
  <canvas id="sim-canvas"></canvas>
</div>

<div id="controls">
  <div id="timeline">
    <button id="btn-play" class="active">▶ Play</button>
    <button id="btn-pause">⏸ Pause</button>
    <input type="range" id="slider" min="0" max="100" value="0" />
    <span id="time-label">t = 0 · urban 0.0%</span>
    <span id="speed-label">Speed:</span>
    <select id="speed-select">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
      <option value="3">3×</option>
    </select>
  </div>
  <div id="stats">
    <span><span class="dot" style="background:#58a6ff"></span>mean(u): <b id="stat-mean">0.000</b></span>
    <span><span class="dot" style="background:#f0883e"></span>urban frac: <b id="stat-frac">0.0%</b></span>
    <span><span class="dot" style="background:#3fb950"></span>corridor ratio: <b id="stat-ratio">0.00</b></span>
  </div>
</div>

<script>
const canvas = document.getElementById('sim-canvas');
const ctx = canvas.getContext('2d');

const COLOURS = {
  0: '#E8E0DA',
  1: '#8CD67A',
  2: '#64B5F6',
  3: '#388E3C',
  4: '#FF7043',
  5: '#78909C',
};

let simData = null;
let currentFrame = 0;
let playing = true;
let playSpeed = 1;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let tileW = 22;
let tileH = 11;
let board = null;

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function hash01(a, b, c = 0) {
  const x = Math.sin(a * 127.1 + b * 311.7 + c * 29.3) * 43758.5453123;
  return x - Math.floor(x);
}

function hexToRgb(hex) {
  const s = hex.replace('#', '');
  return {
    r: parseInt(s.slice(0, 2), 16),
    g: parseInt(s.slice(2, 4), 16),
    b: parseInt(s.slice(4, 6), 16),
  };
}

function rgbToHex({ r, g, b }) {
  return `#${[r, g, b].map(v => clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0')).join('')}`;
}

function shade(hex, factor) {
  const { r, g, b } = hexToRgb(hex);
  return rgbToHex({ r: r * factor, g: g * factor, b: b * factor });
}

function mix(hexA, hexB, t) {
  const a = hexToRgb(hexA);
  const b = hexToRgb(hexB);
  return rgbToHex({
    r: a.r * (1 - t) + b.r * t,
    g: a.g * (1 - t) + b.g * t,
    b: a.b * (1 - t) + b.b * t,
  });
}

function resizeCanvas() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = `${w}px`;
  canvas.style.height = `${h}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (simData) {
    computeBoardLayout();
    renderFrame(currentFrame);
  }
}

function computeBoardLayout() {
  const rows = simData.grid.rows;
  const cols = simData.grid.cols;
  const availW = window.innerWidth * 0.95;
  const availH = window.innerHeight * 0.76;
  const tileWByWidth = availW / ((rows + cols) * 0.54);
  const tileWByHeight = availH / (((rows + cols) * 0.25) + 9.5);
  tileW = clamp(Math.min(tileWByWidth, tileWByHeight), 8, 28);
  tileH = tileW * 0.48;

  const boardW = (rows + cols) * tileW * 0.5;
  const boardH = (rows + cols) * tileH * 0.5;
  const maxTowerH = tileH * 6.2;
  board = {
    originX: window.innerWidth / 2,
    originY: 72 + maxTowerH * 0.74,
    width: boardW,
    height: boardH,
    maxTowerH,
  };
}

function isoPoint(r, c) {
  return {
    x: board.originX + (c - r) * tileW * 0.5,
    y: board.originY + (c + r) * tileH * 0.5,
  };
}

function drawDiamond(x, y, w, h, fill, stroke = null, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(x, y - h / 2);
  ctx.lineTo(x + w / 2, y);
  ctx.lineTo(x, y + h / 2);
  ctx.lineTo(x - w / 2, y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();
}

function drawPrism(x, y, w, h, lift, top, left, right, outline = null) {
  const topY = y - lift;
  ctx.beginPath();
  ctx.moveTo(x, topY - h / 2);
  ctx.lineTo(x + w / 2, topY);
  ctx.lineTo(x, topY + h / 2);
  ctx.lineTo(x - w / 2, topY);
  ctx.closePath();
  ctx.fillStyle = top;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x - w / 2, topY);
  ctx.lineTo(x, topY + h / 2);
  ctx.lineTo(x, y + h / 2);
  ctx.lineTo(x - w / 2, y);
  ctx.closePath();
  ctx.fillStyle = left;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x + w / 2, topY);
  ctx.lineTo(x, topY + h / 2);
  ctx.lineTo(x, y + h / 2);
  ctx.lineTo(x + w / 2, y);
  ctx.closePath();
  ctx.fillStyle = right;
  ctx.fill();

  if (outline) {
    ctx.strokeStyle = outline;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

function drawWater(x, y) {
  drawDiamond(x, y + tileH * 0.08, tileW, tileH, '#71c7ff', '#3b9de0');
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - tileW * 0.18, y);
  ctx.lineTo(x + tileW * 0.18, y - tileH * 0.12);
  ctx.stroke();
  ctx.restore();
}

function drawFarmland(x, y, r, c) {
  drawPrism(x, y, tileW, tileH, tileH * 0.20, '#9be17f', '#75c766', '#5fbf5c', 'rgba(255,255,255,0.35)');
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 0.9;
  for (let i = -2; i <= 2; i++) {
    const phase = hash01(r, c, i);
    ctx.beginPath();
    ctx.moveTo(x - tileW * 0.33 + i * tileW * 0.12, y - tileH * 0.02);
    ctx.lineTo(x + tileW * 0.02 + i * tileW * 0.12, y - tileH * 0.26 - phase * tileH * 0.08);
    ctx.stroke();
  }
  ctx.restore();
}

function drawEco(x, y, r, c) {
  drawPrism(x, y, tileW, tileH, tileH * 0.24, '#4ba24d', '#2e7b34', '#2b8a35');
  const n = 2 + Math.round(hash01(r, c, 5) * 1.5);
  for (let i = 0; i < n; i++) {
    const dx = (hash01(r, c, 20 + i) - 0.5) * tileW * 0.28;
    const dy = (hash01(r, c, 30 + i) - 0.5) * tileH * 0.18;
    const rad = tileH * (0.20 + hash01(r, c, 40 + i) * 0.14);
    ctx.fillStyle = i % 2 ? '#2e7d32' : '#56b35d';
    ctx.beginPath();
    ctx.arc(x + dx, y - tileH * 0.6 + dy, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5c4536';
    ctx.fillRect(x + dx - 0.8, y - tileH * 0.42 + dy, 1.6, tileH * 0.22);
  }
}

function drawSettlement(x, y, density, r, c) {
  const podiumLift = tileH * 0.30;
  drawPrism(x, y, tileW, tileH, podiumLift, '#f8ece6', '#f0cdc0', '#e7b19a', 'rgba(255,255,255,0.48)');

  ctx.save();
  ctx.fillStyle = 'rgba(197, 108, 67, 0.12)';
  ctx.beginPath();
  ctx.ellipse(x + tileW * 0.08, y + tileH * 0.18, tileW * 0.26, tileH * 0.14, 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const h = Math.pow(clamp(density, 0, 1), 0.84);

  drawPrism(
    x + tileW * 0.02,
    y - podiumLift * 0.46,
    tileW * 0.54,
    tileH * 0.24,
    tileH * (0.26 + h * 0.42),
    '#fff2eb',
    '#f4ddd2',
    '#e8bca5',
    null
  );

  const towers = [];
  if (h > 0.10) {
    towers.push({ dx: 0, dy: 0, w: tileW * 0.50, d: tileH * 0.42, h: tileH * (1.0 + h * 3.8) });
  }
  if (h > 0.24) {
    towers.push({ dx: -tileW * 0.18, dy: tileH * 0.05, w: tileW * 0.30, d: tileH * 0.28, h: tileH * (0.8 + h * 1.9) });
  }
  if (h > 0.48) {
    towers.push({ dx: tileW * 0.20, dy: -tileH * 0.03, w: tileW * 0.28, d: tileH * 0.26, h: tileH * (0.7 + h * 1.8) });
  }

  towers.forEach((t, i) => {
    const jitter = (hash01(r, c, 80 + i) - 0.5) * tileW * 0.04;
    const bx = x + t.dx + jitter;
    const by = y - podiumLift * 0.9 + t.dy;
    const lift = t.h;
    const top = i === 0 ? '#ff845b' : '#ff9f7b';
    const left = i === 0 ? '#fae7dd' : '#f6dbd0';
    const right = i === 0 ? '#d79b80' : '#e0b29b';
    drawPrism(bx, by, t.w, t.d, lift, top, left, right);

    const windows = Math.max(2, Math.floor(lift / (tileH * 0.62)));
    ctx.save();
    ctx.fillStyle = 'rgba(120, 201, 255, 0.66)';
    for (let k = 0; k < windows; k++) {
      const wy = by - lift + t.d * 0.55 + k * tileH * 0.44;
      ctx.fillRect(bx - t.w * 0.22, wy, t.w * 0.10, tileH * 0.11);
      ctx.fillRect(bx + t.w * 0.02, wy + tileH * 0.03, t.w * 0.14, tileH * 0.11);
    }
    ctx.restore();
  });
}

function drawBare(x, y) {
  drawPrism(x, y, tileW, tileH, tileH * 0.14, '#f0e8e2', '#e4d8cf', '#dcccc0', 'rgba(180,150,135,0.22)');
}

function renderFrame(idx) {
  if (!simData) {
    return;
  }
  const width = window.innerWidth;
  const height = window.innerHeight;
  ctx.clearRect(0, 0, width, height);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);

  const frame = simData.frames[idx];
  const rows = simData.grid.rows;
  const cols = simData.grid.cols;

  ctx.save();
  ctx.fillStyle = 'rgba(175, 193, 211, 0.10)';
  ctx.beginPath();
  ctx.ellipse(
    board.originX,
    board.originY + board.height * 0.58,
    board.width * 0.42,
    board.height * 0.24,
    0,
    0,
    Math.PI * 2
  );
  ctx.fill();
  ctx.restore();

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const kind = frame.tiles[r][c];
      const density = frame.density?.[r]?.[c] || 0;
      const { x, y } = isoPoint(r, c);
      if (kind === 2) {
        drawWater(x, y);
      } else if (kind === 1) {
        drawFarmland(x, y, r, c);
      } else if (kind === 3) {
        drawEco(x, y, r, c);
      } else if (kind === 4) {
        drawSettlement(x, y, density, r, c);
      } else {
        drawBare(x, y);
      }
    }
  }
}

function updateUI(idx) {
  const frame = simData.frames[idx];
  const diag = simData.diagnostics;
  const uf = diag.urban_frac[idx];
  const mu = diag.mean_u[idx];
  const cr = diag.corridor_ratio[idx];

  document.getElementById('time-label').textContent =
    `t = ${frame.t} · urban ${(uf * 100).toFixed(1)}%`;
  document.getElementById('stat-mean').textContent = mu.toFixed(3);
  document.getElementById('stat-frac').textContent = `${(uf * 100).toFixed(1)}%`;
  document.getElementById('stat-ratio').textContent = cr.toFixed(2);
  document.getElementById('slider').value = idx;
}

async function init() {
  const resp = await fetch('sim_data.json');
  simData = await resp.json();
  document.getElementById('loading').style.display = 'none';

  computeBoardLayout();
  const slider = document.getElementById('slider');
  slider.max = simData.frames.length - 1;

  slider.addEventListener('input', (e) => {
    currentFrame = parseInt(e.target.value, 10);
    renderFrame(currentFrame);
    updateUI(currentFrame);
  });

  document.getElementById('btn-play').addEventListener('click', () => {
    playing = true;
    document.getElementById('btn-play').classList.add('active');
    document.getElementById('btn-pause').classList.remove('active');
  });
  document.getElementById('btn-pause').addEventListener('click', () => {
    playing = false;
    document.getElementById('btn-pause').classList.add('active');
    document.getElementById('btn-play').classList.remove('active');
  });
  document.getElementById('speed-select').addEventListener('change', (e) => {
    playSpeed = parseFloat(e.target.value);
  });

  renderFrame(0);
  updateUI(0);

  let lastAdvance = 0;
  const baseInterval = 130;
  function animate(time) {
    requestAnimationFrame(animate);
    if (playing && time - lastAdvance >= baseInterval / playSpeed) {
      lastAdvance = time;
      currentFrame = (currentFrame + 1) % simData.frames.length;
      renderFrame(currentFrame);
      updateUI(currentFrame);
    }
  }
  animate(0);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
init().catch((err) => {
  document.getElementById('loading').textContent = `Failed to load simulation: ${err.message}`;
  console.error(err);
});
</script>
</body>
</html>
